# ==============================================================================
# .tmux.conf - Terminal Session Multi-Pane Workspace Layout
# ==============================================================================

# Change global control sequence binder from Ctrl-b to Ctrl-a (Easier layout control)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Re-map panel splitting shortcuts to highly recognizable anchors
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Enable smooth keyboard panel transitions matching standard Vim directions
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status Bar Styling (Flat Muted Charcoal and Cream)
set -g status-bg '#2c302e'
set -g status-fg '#f5ede6'
set -g status-left-length 20
set -g status-left '[Yosemite] '
